<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Samar Math - Boys</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e3f2fd; color: #0d47a1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(13, 71, 161, 0.1); border: 2px solid #90caf9; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #01579b; font-size: 22px; margin-bottom: 20px; border-bottom: 2px solid #e1f5fe; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 2px solid #64b5f6; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; outline: none; font-size: 16px; }
        button.add-btn { background: #1565c0; color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.add-btn:hover { background: #0d47a1; transform: translateY(-2px); }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #f1f8ff; margin-bottom: 10px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid #1565c0; animation: fadeIn 0.5s ease; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .footer { margin-top: 25px; font-size: 12px; color: #01579b; font-weight: bold; opacity: 0.7; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>💎 ركن الأبطال المبدعين</h1>
        <input type="text" id="nameInput" placeholder="اكتبي اسم البطل هنا...">
        <button class="add-btn" onclick="addName()">إضافة للقائمة ⚡</button>
        <ul id="nameList"></ul>
        <div class="footer">T-SAMAR MATH 💎 Math Comes to Life</div>
    </div>

    <script>
        function loadNames() {
            const names = JSON.parse(localStorage.getItem('SamarBoysData')) || [];
            const list = document.getElementById('nameList');
            list.innerHTML = '';
            names.forEach((name, index) => {
                const li = document.createElement('li');
                li.innerHTML = <span>${name}</span> <button class="delete-btn" onclick="removeName(${index})">حذف</button>;
                list.appendChild(li);
            });
        }
        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name) {
                const names = JSON.parse(localStorage.getItem('SamarBoysData')) || [];
                names.push(name);
                localStorage.setItem('SamarBoysData', JSON.stringify(names));
                input.value = '';
                loadNames();
            }
        }
        function removeName(index) {
            const names = JSON.parse(localStorage.getItem('SamarBoysData')) || [];
            names.splice(index, 1);
            localStorage.setItem('SamarBoysData', JSON.stringify(names));
            loadNames();
        }
        window.onload = loadNames;
    </script>
</body>
</html>
