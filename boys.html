<a href="https://www.instagram.com/t_samar_math" target="_blank" class="fab fa-instagram" title="Instagram"></a>
        </div>
        <p style="color:#d4af37; margin-top:20px; font-weight:bold;">T-SAMAR MATH © 2026</p>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(frequency) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = frequency;
            gain.gain.value = 0.1;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.5);
            osc.stop(audioContext.currentTime + 0.5);
        }

        // --- تعديل الحفظ يبدأ من هنا ---
        let studentsData = JSON.parse(localStorage.getItem('TS_Boys_Storage')) || [];
        const stageEmojis = ['⚡', '🔥', '🚀', '⭐', '🎖️', '💎'];

        function addNewStudent() {
            const name = document.getElementById('studentInput').value.trim();
            if(name) {
                studentsData.push({ id: Date.now(), name: name, stage: 0, lastUpdate: Date.now() });
                document.getElementById('studentInput').value = "";
                saveData();
                playBeep(440);
                refreshUI();
            }
        }

        function upgradeStudent(id) {
            let index = studentsData.findIndex(s => s.id === id);
            if(studentsData[index].stage < 5) {
                studentsData[index].stage++;
                studentsData[index].lastUpdate = Date.now();
                saveData();
                playBeep(523 + (studentsData[index].stage * 100));
                refreshUI();
            }
        }

        // وظيفة حذف بطل معين
        function deleteStudent(id) {
            studentsData = studentsData.filter(s => s.id !== id);
            saveData();
            refreshUI();
        }

        // حفظ البيانات في ذاكرة المتصفح
        function saveData() {
            localStorage.setItem('TS_Boys_Storage', JSON.stringify(studentsData));
        }

        function refreshUI() {
            studentsData.sort((a, b) => b.stage - a.stage || b.lastUpdate - a.lastUpdate);

            const ticker = document.getElementById('leaderBoardText');
            if(studentsData.length > 0 && studentsData[0].stage > 0) {
                ticker.innerText = 👑 بطل الحصة الآن: ${studentsData[0].name} (مرحلة ${stageEmojis[studentsData[0].stage]}) مباااارك! 👑;
            } else {
                ticker.innerText = "بانتظار أول بطل لتصدر القائمة... 💎⚡🚀";
            }

            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = "";
            studentsData.forEach((student, index) => {
                const isWinner = (index === 0 && student.stage > 0);
                grid.innerHTML += 
                    <div class="card ${isWinner ? 'top-winner' : ''}">
                        <button class="del-btn" onclick="deleteStudent(${student.id})">×</button>
                        <span class="emoji">${stageEmojis[student.stage]}</span>
                        <span class="name">${student.name}</span>
                        <button class="btn-up" onclick="upgradeStudent(${student.id})">تسجيل إنجاز ✨</button>
                    </div>
                ;
            });
        }

        // تشغيل العرض عند فتح الصفحة لأول مرة
        window.onload = refreshUI;
    </script>
</body>
</html>
