<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>T-Samar Math | تحدي الأبطال 🏆</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* شريط المتصدر الذهبي */
        .ticker-wrap { background: #d4af37; color: #000; padding: 12px 0; font-weight: bold; overflow: hidden; white-space: nowrap; margin-bottom: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .ticker { display: inline-block; animation: ticker 15s linear infinite; font-size: 1.3rem; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .header { border: 2px solid #00d2ff; padding: 15px; border-radius: 20px; margin-bottom: 20px; background: #111; }
        
        .input-area { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #333; }
        input { padding: 12px; border-radius: 8px; border: 2px solid #d4af37; width: 220px; font-size: 1rem; text-align: center; background: #000; color: #fff; }
        .btn-add { background: #d4af37; color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { background: #fff; }

        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 25px; width: 220px; transition: 0.5s; position: relative; }
        .card.top-winner { border: 3px solid #d4af37; box-shadow: 0 0 25px #d4af37; transform: scale(1.05); }

        .emoji { font-size: 60px; display: block; margin-bottom: 15px; }
        .name { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .btn-up { background: #fff; color: #000; border: none; width: 100%; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-up:active { transform: scale(0.9); }

        /* الروابط بأشكالها الحقيقية */
        .footer { margin-top: 60px; padding: 30px; border-top: 1px solid #333; }
        .social-icons { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .social-icons a { font-size: 3rem; text-decoration: none; transition: 0.3s; }
        .fa-youtube { color: #FF0000; }
        .fa-tiktok { color: #fff; text-shadow: 2px 2px #ff0050, -2px -2px #00f2ea; }
        .fa-instagram { color: #E1306C; }
        .social-icons a:hover { transform: scale(1.3) translateY(-10px); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:#d4af37; margin:0;">T-SAMAR MATH 🏆</h1>
        <p style="color:#00d2ff; font-weight:bold;">تحدي الأبطال للأولاد 🛸</p>
    </div>

    <div class="ticker-wrap">
        <div class="ticker" id="leaderBoardText">بانتظار أول بطل لتصدر القائمة... 💎⚡🚀</div>
    </div>

    <div class="input-area">
        <input type="text" id="studentInput" placeholder="اسم بطل الحصة...">
        <button class="btn-add" onclick="addNewStudent()">إضافة بطل +</button>
    </div>

    <div id="cardsGrid" class="grid"></div>

    <div class="footer">
        <div class="social-icons">
            <a href="https://youtube.com/@t_samar_math" target="_blank" class="fab fa-youtube" title="YouTube"></a>
            <a href="https://tiktok.com/@t_samora" target="_blank" class="fab fa-tiktok" title="TikTok"></a>
            <a href="https://www.instagram.com/t_samar_math" target="_blank" class="fab fa-instagram" title="Instagram"></a>
        </div>
        <p style="color:#d4af37; margin-top:20px; font-weight:bold;">T-SAMAR MATH © 2026</p>
    </div>

    <script>
        // نظام الصوت الآمن (AudioContext)
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(frequency) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = frequency;
            gain.gain.value = 0.1;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.5);
            osc.stop(audioContext.currentTime + 0.5);
        }

        let studentsData = [];
        const stageEmojis = ['⚡', '🔥', '🚀', '⭐', '🎖️', '💎'];

        function addNewStudent() {
            const name = document.getElementById('studentInput').value.trim();
            if(name) {
                studentsData.push({ id: Date.now(), name: name, stage: 0, lastUpdate: Date.now() });
                document.getElementById('studentInput').value = "";
                playBeep(440); // صوت إضافة
                refreshUI();
            }
        }

        function upgradeStudent(id) {
            let index = studentsData.findIndex(s => s.id === id);
            if(studentsData[index].stage < 5) {
                studentsData[index].stage++;
                studentsData[index].lastUpdate = Date.now();
                playBeep(523 + (studentsData[index].stage * 100)); // صوت ترررر
                refreshUI();
            }
        }

        function refreshUI() {
            // ترتيب الطلاب (الأعلى مرحلة أولاً)
            studentsData.sort((a, b) => b.stage - a.stage || b.lastUpdate - a.lastUpdate);

            // تحديث شريط المتصدر
            const ticker = document.getElementById('leaderBoardText');
            if(studentsData.length > 0 && studentsData[0].stage > 0) {
                ticker.innerText = `👑 بطل الحصة الآن: ${studentsData[0].name} (مرحلة ${stageEmojis[studentsData[0].stage]}) مباااارك! 👑`;
            }

            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = "";
            studentsData.forEach((student, index) => {
                const isWinner = (index === 0 && student.stage > 0);
                grid.innerHTML += `
                    <div class="card ${isWinner ? 'top-winner' : ''}">
                        <span class="emoji">${stageEmojis[student.stage]}</span>
                        <span class="name">${student.name}</span>
                        <button class="btn-up" onclick="upgradeStudent(${student.id})">تسجيل إنجاز ✨</button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
