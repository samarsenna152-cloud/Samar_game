<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Samar Math - Girls Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #fff0f5; color: #d81b60; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 3px solid #f8bbd0; }
        h1 { color: #ad1457; font-size: 24px; margin-bottom: 20px; }
        input { padding: 12px; width: 80%; border-radius: 10px; border: 2px solid #f06292; margin-bottom: 10px; font-size: 16px; outline: none; }
        button.add-btn { padding: 12px 25px; background-color: #d81b60; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 85%; transition: 0.3s; }
        button.add-btn:hover { background-color: #ad1457; transform: scale(1.02); }
        ul { list-style: none; padding: 0; margin-top: 20px; text-align: right; }
        li { background: #fce4ec; margin: 8px 0; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f8bbd0; font-weight: 500; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .footer { margin-top: 20px; font-size: 14px; color: #880e4f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 عالم الأميرات - T-Samar</h1>
        <input type="text" id="nameInput" placeholder="اكتبي اسم الطالبة المبدعة...">
        <button class="add-btn" onclick="addName()">إضافة الطالبة ✨</button>
        <ul id="nameList"></ul>
        <div class="footer">Math Comes to Life | T-Samar 💎</div>
    </div>

    <script>
        // وظيفة تحميل الأسماء من ذاكرة المتصفح الدائمة (LocalStorage)
        function loadNames() {
            const savedNames = JSON.parse(localStorage.getItem('T_Samar_Girls')) || [];
            const list = document.getElementById('nameList');
            list.innerHTML = '';
            savedNames.forEach((name, index) => {
                const li = document.createElement('li');
                li.innerHTML = <span>${name}</span> <button class="delete-btn" onclick="deleteName(${index})">حذف</button>;
                list.appendChild(li);
            });
        }

        // وظيفة إضافة اسم وحفظه للأبد في الجهاز
        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name) {
                const savedNames = JSON.parse(localStorage.getItem('T_Samar_Girls')) || [];
                savedNames.push(name);
                localStorage.setItem('T_Samar_Girls', JSON.stringify(savedNames));
                input.value = '';
                loadNames();
            }
        }

        // وظيفة حذف اسم من القائمة والذاكرة
        function deleteName(index) {
            const savedNames = JSON.parse(localStorage.getItem('T_Samar_Girls')) || [];
            savedNames.splice(index, 1);
            localStorage.setItem('T_Samar_Girls', JSON.stringify(savedNames));
            loadNames();
        }

        // تشغيل التحميل بمجرد فتح الصفحة
        window.onload = loadNames;
    </script>
</body>
</html>
