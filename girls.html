<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Samar Math</title>
    <style>
        /* التنسيق البنفسجي والذهبي الفخم الأصلي لمس سمر */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f1e6ff; text-align: center; padding: 20px; }
        .box { max-width: 450px; margin: auto; background: #5c2d91; padding: 30px; border-radius: 25px; box-shadow: 0 12px 25px rgba(92, 45, 145, 0.2); border: 3px solid #ffd700; color: white; }
        h1 { color: #ffd700; font-size: 26px; margin-bottom: 25px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .input-area { background: white; border-radius: 15px; padding: 5px; display: flex; align-items: center; margin-bottom: 20px; border: 1px solid #ffd700; }
        input { flex: 1; padding: 12px; border: none; outline: none; font-size: 16px; text-align: right; border-radius: 15px; }
        .btn { background: #ffd700; color: #5c2d91; border: none; padding: 12px 25px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #ffea00; transform: translateY(-2px); }
        ul { list-style: none; padding: 0; margin-top: 25px; text-align: right; }
        li { background: white; color: #5c2d91; margin: 10px 0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 2px solid #5c2d91; font-weight: 500; font-size: 16px; animation: fadeIn 0.4s ease; }
        .del { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="box">
        <h1>👑 T-SAMAR MATH - عالم الأميرات 👑</h1>
        <div class="input-area">
            <input type="text" id="nameIn" placeholder="اكتبي اسم الطالبة المبدعة...">
            <button class="btn" onclick="saveName()">إضافة أميرة ✨</button>
        </div>
        <ul id="list"></ul>
    </div>

    <script>
        // وظيفة عرض الأسماء المحفوظة
        function show() {
            // قراءة الأسماء من الذاكرة الدائمة أو إنشاء قائمة فارغة
            const names = JSON.parse(localStorage.getItem('T_Girls_Fakhama_Save')) || [];
            const list = document.getElementById('list');
            list.innerHTML = ''; // تفريغ القائمة الحالية

            // عرض كل اسم في عنصر مستقل
            names.forEach((n, i) => {
                const li = document.createElement('li');
                li.innerHTML = <span>${n}</span> <button class="del" onclick="delName(${i})">حذف</button>;
                list.appendChild(li);
            });
        }

        // وظيفة الإضافة والحفظ
        function saveName() {
            const input = document.getElementById('nameIn');
            const name = input.value.trim();
            if (name) {
                // قراءة القائمة الحالية
                const names = JSON.parse(localStorage.getItem('T_Girls_Fakhama_Save')) || [];
                // إضافة الاسم الجديد
                names.push(name);
                // حفظ القائمة المحدثة في الذاكرة الدائمة للجهاز (localStorage)
                localStorage.setItem('T_Girls_Fakhama_Save', JSON.stringify(names));
                input.value = ''; // مسح خانة الإدخال
                show(); // تحديث العرض
            }
        }

        // وظيفة الحذف من الذاكرة
        function delName(i) {
            const names = JSON.parse(localStorage.getItem('T_Girls_Fakhama_Save')) || [];
            // حذف الاسم من الترتيب
            names.splice(i, 1);
            // حفظ القائمة المحدثة في الذاكرة
            localStorage.setItem('T_Girls_Fakhama_Save', JSON.stringify(names));
            show(); // تحديث العرض
        }

        // تشغيل العرض فور فتح الصفحة لضمان بقاء الأسماء
        window.onload = show;
    </script>
</body>
</html>
