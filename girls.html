<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Samar Math - Boys Edition</title>
    <style>
        /* الألوان المفضلة لمس سمر: Royal Blue & Gold */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #e3f2fd; color: #0d47a1; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 3px solid #90caf9; }
        h1 { color: #01579b; font-size: 24px; margin-bottom: 20px; }
        input { padding: 12px; width: 80%; border-radius: 10px; border: 2px solid #1e88e5; margin-bottom: 10px; font-size: 16px; outline: none; }
        button.add-btn { padding: 12px 25px; background-color: #1565c0; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 85%; transition: 0.3s; }
        button.add-btn:hover { background-color: #0d47a1; transform: scale(1.02); }
        ul { list-style: none; padding: 0; margin-top: 20px; text-align: right; }
        li { background: #e1f5fe; margin: 8px 0; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #90caf9; font-weight: 500; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .footer { margin-top: 20px; font-size: 14px; color: #01579b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 عالم الأبطال - T-Samar</h1>
        <input type="text" id="nameInput" placeholder="اكتبي اسم البطل المبدع...">
        <button class="add-btn" onclick="addName()">إضافة البطل ⚡</button>
        <ul id="nameList"></ul>
        <div class="footer">Math Comes to Life | T-Samar 💎</div>
    </div>

    <script>
        // دالة تحميل الأسماء من الذاكرة الدائمة للجهاز
        function loadNames() {
            const savedNames = JSON.parse(localStorage.getItem('T_Samar_Boys')) || [];
            const list = document.getElementById('nameList');
            list.innerHTML = '';
            savedNames.forEach((name, index) => {
                const li = document.createElement('li');
                li.innerHTML = <span>${name}</span> <button class="delete-btn" onclick="deleteName(${index})">حذف</button>;
                list.appendChild(li);
            });
        }

        // دالة إضافة الاسم وحفظه في الذاكرة
        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name) {
                const savedNames = JSON.parse(localStorage.getItem('T_Samar_Boys')) || [];
                savedNames.push(name);
                localStorage.setItem('T_Samar_Boys', JSON.stringify(savedNames));
                input.value = '';
                loadNames();
            }
        }

        // دالة حذف الاسم وتحديث الذاكرة
        function deleteName(index) {
            const savedNames = JSON.parse(localStorage.getItem('T_Samar_Boys')) || [];
            savedNames.splice(index, 1);
            localStorage.setItem('T_Samar_Boys', JSON.stringify(savedNames));
            loadNames();
        }

        // تنفيذ التحميل بمجرد فتح الصفحة
        window.onload = loadNames;
    </script>
</body>
</html>
