<script>
    // نظام الصوت الذكي
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // وظيفة العرض من الذاكرة
    function loadNames() {
        const saved = JSON.parse(localStorage.getItem('SamarRoyal_Final_V4')) || [];
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        saved.forEach((name, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = <i class="fas fa-crown"></i><span class="name">${name}</span><button class="del-btn" onclick="deleteName(${index})">حذف</button>;
            grid.appendChild(card);
        });
    }

    // وظيفة الإضافة والحفظ
    function addName() {
        const input = document.getElementById('nameInput');
        const name = input.value.trim();
        if (name) {
            playSound();
            const saved = JSON.parse(localStorage.getItem('SamarRoyal_Final_V4')) || [];
            saved.push(name);
            localStorage.setItem('SamarRoyal_Final_V4', JSON.stringify(saved));
            input.value = '';
            loadNames();
        }
    }

    // وظيفة الحذف
    function deleteName(index) {
        const saved = JSON.parse(localStorage.getItem('SamarRoyal_Final_V4')) || [];
        saved.splice(index, 1);
        localStorage.setItem('SamarRoyal_Final_V4', JSON.stringify(saved));
        loadNames();
    }

    window.onload = loadNames;
</script>
</body>
</html>
