    <script>
        // أصوات خفيفة جداً
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq; gain.gain.value = 0.05;
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // السيارات المتدرجة (من العادية للسوبر)
        const cars = ['🚗', '🚕', '🚙', '🏎️', '🚀', '⚡'];
        const levels = ['مبتدئ', 'سائق محترف', 'سريع', 'نيترو', 'أسطورة السباق', 'برق بنزين'];

        let racers = JSON.parse(localStorage.getItem('TS_Car_Race')) || [];

        function addCar() {
            const name = document.getElementById('nameInput').value.trim();
            if (name && racers.length < 30) {
                racers.push({ id: Date.now(), name: name, level: 0 });
                document.getElementById('nameInput').value = "";
                beep(400);
                saveAndRender();
            } else if (racers.length >= 30) { alert('السباق مكتمل! (الحد الأقصى 30 بطل)'); }
        }

        function upgrade(id) {
            let r = racers.find(x => x.id === id);
            if (r && r.level < 5) {
                r.level++;
                beep(600 + (r.level * 50));
                saveAndRender();
            }
        }

        function remove(id) {
            racers = racers.filter(x => x.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('TS_Car_Race', JSON.stringify(racers));
            render();
        }

        function render() {
            // ترتيب حسب المستوى
            racers.sort((a, b) => b.level - a.level);
            
            const ticker = document.getElementById('ticker');
            if (racers.length > 0 && racers[0].level > 0) {
                ticker.innerHTML = 👑 المتصدر الآن: <b>${racers[0].name}</b> وصل لمرحلة <b>${levels[racers[0].level]}</b> مبااااارك! 🏆🔥;
            }

            const track = document.getElementById('raceTrack');
            track.innerHTML = "";
            racers.forEach((r, i) => {
                const isWinner = (i === 0 && r.level > 0);
                track.innerHTML += 
                    <div class="car-card ${isWinner ? 'winner' : ''}">
                        <button class="del-btn" onclick="remove(${r.id})">×</button>
                        <span class="pilot-name">${r.name}</span>
                        <span class="car-visual">${cars[r.level]}</span>
                        <div style="font-size:0.9rem; color:#888; margin-bottom:10px;">${levels[r.level]}</div>
                        <button class="btn-gas" onclick="upgrade(${r.id})">دفع نيترو 💨</button>
                    </div>;
            });
        }

        window.onload = render;
    </script>
</body>
